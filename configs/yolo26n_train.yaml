model: yolo26n.pt
data: data/yolo/sm_nzb/dataset.yaml
project: outputs/yolo_runs
name: yolo26n_sm_nzb

epochs: 300
patience: 50
imgsz: 640
batch: 32
device: 0
workers: 0
seed: 42
pretrained: true
cache: false
amp: true

optimizer: auto
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

cos_lr: true
close_mosaic: 10
single_cls: false
rect: false
multi_scale: false

conf: 0.001
iou: 0.7
max_det: 300
plots: true
save: true
save_period: 10
exist_ok: true
